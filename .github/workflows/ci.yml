name: CI

on:
  push:
    branches:
      - main
      - project/**
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build

      - name: Render screenshots
        run: python3 scripts/generate_screenshots.py
